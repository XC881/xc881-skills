interface:
  display_name: "xc881需求分析"
  short_description: "Explicit-only requirement analysis before coding"
  default_prompt: "Use $xc881-requirement-analysis only when explicitly invoked. Do not auto-trigger from ordinary requirement/product/planning keywords. When active, do not write code. Normalize rough requests when needed, separate explicit/inferred/assumed requirements, define scope, acceptance criteria, risks, and handoff to $xc881-coding-skills."
