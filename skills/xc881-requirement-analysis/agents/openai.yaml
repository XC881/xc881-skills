interface:
  display_name: "xc881需求分析"
  short_description: "Requirement analysis for new projects, existing project features, implicit requirements, acceptance criteria, risks, and engineering handoff"
  default_prompt: "Use $xc881-requirement-analysis. Do not write code. Use English Spec First normalization when the request is rough, multilingual, ambiguous, scattered, or mixed Chinese-English. First classify whether this is a new project or an existing project feature. Capture explicit requirements, infer hidden prerequisite/dependency/consequence requirements, define users, scope, MVP or affected existing behavior, acceptance criteria, risks, unknowns, and a phased engineering implementation plan for handoff to $xc881-coding-skills."
policy:
  allow_implicit_invocation: true
