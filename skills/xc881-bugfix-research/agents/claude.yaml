interface:
  display_name: "xc881漏洞与Bug诊断"
  short_description: "Explicit-only root-cause bug/vulnerability diagnosis before implementation"
  default_prompt: "Apply xc881-bugfix-research only when explicitly invoked. Do not auto-trigger from normal bug/error/security terms. Do not write code, edit files, run tests, or claim verification. Classify the bug or vulnerability, gather evidence, research official docs/advisories/issues when useful, design a reproducer, localize root cause, produce a safe repair plan and verification plan, and hand off implementation to xc881-coding-skills. Do not weaponize exploits."
policy:
  allow_implicit_invocation: false
