interface:
  display_name: "xc881漏洞与Bug诊断"
  short_description: "Explicit-only bug/vulnerability diagnosis, root-cause analysis, repair planning, and handoff"
  default_prompt: "Use $xc881-bugfix-research only when explicitly invoked. Do not auto-trigger from ordinary bug/error/vulnerability keywords. Do not edit code or claim verification. Diagnose symptoms, logs, stack traces, advisories, or code context; use web research when useful; separate evidence from hypotheses; plan a reproducer, root cause, minimal safe repair, verification plan, and handoff to $xc881-coding-skills. Do not provide weaponized exploit steps."
